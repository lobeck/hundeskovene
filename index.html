<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danmarks Hundeskove – oversigt og detaljer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <h1>Danmarks Hundeskove</h1>
    <p class="tagline">Oversigt over hundeskove med størrelse og faciliteter</p>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span id="forest-count">0</span> hundeskove
      </div>
      <ul id="forest-list" class="forest-list" aria-label="Liste over hundeskove"></ul>
    </aside>

    <main class="map-container">
      <div id="map" class="map" aria-label="Kort over danske hundeskove"></div>
      <div id="detail-panel" class="detail-panel hidden" aria-live="polite">
        <button type="button" class="detail-close" id="detail-close" aria-label="Luk detaljer">×</button>
        <div id="detail-content"></div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/app.js"></script>
</body>
</html>
